name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        run: mypy src/seidr_smidja/
        # Blender scripts import bpy which is not available outside Blender.
        # They are excluded from mypy checks.
        continue-on-error: true   # Mypy may flag bpy stubs — treat as informational

      - name: Run tests (non-Blender)
        # pyproject.toml already sets addopts = "-m 'not requires_blender'"
        run: pytest --tb=short -q

      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=seidr_smidja --cov-report=term-missing
        continue-on-error: true   # Coverage report is informational, not a gate
