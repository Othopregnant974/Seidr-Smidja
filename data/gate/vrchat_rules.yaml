# VRChat Compliance Rules for Seiðr-Smiðja
# Source: VRChat Avatar Performance Ranking documentation (as of 2024)
# All rules loaded at runtime — never hardcoded in Python (Sacred Law I).
# Severity: ERROR = hard fail | WARNING = advisory

target: VRCHAT
display_name: "VRChat Avatar Compliance"

# Performance tiers define polygon/material/texture budgets.
# The active tier target is set in config/defaults.yaml gate.vrchat_tier_target
performance_tiers:
  Excellent:
    polycount: 32000
    skinned_mesh_count: 1
    mesh_count: 4
    material_count: 4
    bone_count: 75
    texture_memory_mb: 40
    dynamic_bone_transform_count: 0
    dynamic_bone_collider_count: 0
    dynamic_bone_collision_check_count: 0
    particle_system_count: 0
    particle_active_limit: 0
    trail_renderer_count: 0
    line_renderer_count: 0
    cloths_count: 0
    physics_collider_count: 0
    audio_source_count: 1
  Good:
    polycount: 70000
    skinned_mesh_count: 2
    mesh_count: 8
    material_count: 8
    bone_count: 150
    texture_memory_mb: 75
    dynamic_bone_transform_count: 32
    dynamic_bone_collider_count: 8
    dynamic_bone_collision_check_count: 256
    particle_system_count: 4
    particle_active_limit: 200
    trail_renderer_count: 4
    line_renderer_count: 4
    cloths_count: 1
    physics_collider_count: 8
    audio_source_count: 4
  Medium:
    polycount: 70000
    skinned_mesh_count: 8
    mesh_count: 16
    material_count: 16
    bone_count: 256
    texture_memory_mb: 110
    dynamic_bone_transform_count: 256
    dynamic_bone_collider_count: 32
    dynamic_bone_collision_check_count: 1024
    particle_system_count: 8
    particle_active_limit: 750
    trail_renderer_count: 8
    line_renderer_count: 8
    cloths_count: 4
    physics_collider_count: 32
    audio_source_count: 8
  Poor:
    polycount: 70000
    skinned_mesh_count: 16
    mesh_count: 24
    material_count: 32
    bone_count: 400
    texture_memory_mb: 150

# Structural rules (applied regardless of tier)
rules:

  - rule_id: "vrchat.humanoid_bones.required"
    display_name: "Required Humanoid Bones Present"
    severity: ERROR
    description: >
      VRChat requires a complete VRM humanoid skeleton. All listed bones must be present
      in the avatar's bone map.
    required_bones:
      - "hips"
      - "spine"
      - "chest"
      - "neck"
      - "head"
      - "leftShoulder"
      - "rightShoulder"
      - "leftUpperArm"
      - "rightUpperArm"
      - "leftLowerArm"
      - "rightLowerArm"
      - "leftHand"
      - "rightHand"
      - "leftUpperLeg"
      - "rightUpperLeg"
      - "leftLowerLeg"
      - "rightLowerLeg"
      - "leftFoot"
      - "rightFoot"

  - rule_id: "vrchat.visemes.sil"
    display_name: "Viseme: sil (silence) Expression Present"
    severity: ERROR
    description: "VRChat requires the 'sil' viseme blendshape for lip-sync."
    field_path: "blendShapes.viseme_sil"

  - rule_id: "vrchat.visemes.pp"
    display_name: "Viseme: pp Expression Present"
    severity: ERROR
    description: "VRChat requires the 'pp' viseme blendshape for lip-sync."
    field_path: "blendShapes.viseme_PP"

  - rule_id: "vrchat.visemes.ff"
    display_name: "Viseme: ff Expression Present"
    severity: ERROR
    description: "VRChat requires the 'ff' viseme blendshape for lip-sync."
    field_path: "blendShapes.viseme_FF"

  - rule_id: "vrchat.visemes.th"
