    field_path: "blendShapes.viseme_ou"

  - rule_id: "vrchat.polycount"
    display_name: "Polygon Count Within Tier Budget"
    severity: ERROR
    description: "Total polygon count must not exceed the budget for the target performance tier."
    field_path: "mesh.polycount"
    # Limit is resolved at runtime from performance_tiers[target_tier].polycount

  - rule_id: "vrchat.material_count"
    display_name: "Material Count Within Tier Budget"
    severity: WARNING
    description: "Total material count should not exceed the tier budget."
    field_path: "materials.count"

  - rule_id: "vrchat.texture_memory"
    display_name: "Texture Memory Within Tier Budget"
    severity: WARNING
    description: "Estimated texture memory usage should not exceed the tier budget (MB)."
    field_path: "textures.estimated_memory_mb"
