# Known Blendshape Names for Seiðr-Smiðja
# Used by the Loom validator to check expression target names against a known set.
# Source: VRoid Studio default blendshapes + VRM spec expression presets.
# All entries are lowercase for case-insensitive matching at validation time.

# VRM Expression Presets (standardized across VRM 0.x and 1.0)
expression_presets:
  # Basic emotions
  - "joy"
  - "angry"
  - "sorrow"
  - "fun"
  - "surprised"
  - "neutral"
  # Lip sync visemes (VRM 0.x naming)
  - "a"
  - "i"
  - "u"
  - "e"
  - "o"
  # VRChat visemes
  - "viseme_sil"
  - "viseme_pp"
  - "viseme_ff"
  - "viseme_th"
  - "viseme_dd"
  - "viseme_kk"
  - "viseme_ch"
  - "viseme_ss"
  - "viseme_nn"
  - "viseme_rr"
  - "viseme_aa"
  - "viseme_e"
  - "viseme_ih"
  - "viseme_oh"
  - "viseme_ou"
  # Eye controls
  - "blink"
  - "blink_l"
  - "blink_r"
  - "lookdown"
  - "lookup"
  - "lookleft"
  - "lookright"

# VRoid Studio standard blendshapes (common subset)
# These are the named morph targets typically available on VRoid-based meshes.
vroid_standard:
  face:
    - "fcl_eye_close_l"
