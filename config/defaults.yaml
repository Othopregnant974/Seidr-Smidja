# Seiðr-Smiðja — Default Configuration
# This file ships with the package. DO NOT edit this file directly.
# Override values in config/user.yaml or via SEIDR_* environment variables.
# See config/README.md for the full layering contract.

# --- Blender Executable Resolution ---
# Priority order (first match wins):
#   1. Environment variable SEIDR_BLENDER_PATH
#   2. config/user.yaml blender.executable
#   3. This file (blender.executable below)
#   4. Platform well-known paths (Windows: Program Files, Linux/macOS: PATH lookup)
blender:
  executable: "blender"          # Assumes blender is on PATH. Override to an absolute path if needed.
  timeout_seconds: 300           # Maximum seconds per Blender subprocess invocation.
  script_tmp_dir: null           # null = use system temp dir (tempfile.mkdtemp). Override for custom tmp location.
  # AUDIT-004 fix: platform hint paths moved from _internal/blender_runner.py to here
  # so they are configurable and satisfy Sacred Law II (no absolute paths hardcoded in Python).
  # These are checked last in the resolution chain — after env var, config executable, and PATH.
  # Operators can extend or override this list in config/user.yaml.
  platform_hints:
    win32:
      - "C:\\Program Files\\Blender Foundation\\Blender 4.2\\blender.exe"
      - "C:\\Program Files\\Blender Foundation\\Blender 4.1\\blender.exe"
      - "C:\\Program Files\\Blender Foundation\\Blender 4.0\\blender.exe"
      - "C:\\Program Files\\Blender Foundation\\Blender 3.6\\blender.exe"
    linux:
      - "/usr/bin/blender"
      - "/usr/local/bin/blender"
    darwin:
      - "/Applications/Blender.app/Contents/MacOS/Blender"
      - "/opt/homebrew/bin/blender"

# --- Annáll (Record) ---
annall:
  adapter: "sqlite"              # Supported: "sqlite" | "null" | "file"
  sqlite:
    db_path: "data/annall/runs.sqlite"   # Relative to the project/output root resolved at startup.
  file:
    jsonl_path: "data/annall/runs.jsonl"  # Appended JSON-lines trace (written alongside SQLite when adapter=sqlite).
  write_jsonl_alongside: true    # When adapter=sqlite, also write JSON-lines to the file adapter path.

# --- Hoard (Asset Library) ---
hoard:
  catalog_path: "data/hoard/catalog.yaml"   # Relative path to the Hoard catalog YAML.
  bases_dir: "data/hoard/bases"             # Directory where base .vrm files are stored.

# --- Oracle Eye (Renderer) ---
oracle_eye:
  renderer: "blender_eevee"      # Only supported renderer in v0.1
  resolution: [1024, 1024]       # [width, height] in pixels
  views:
    - "front"
    - "three_quarter"
    - "side"
    - "face_closeup"
    - "t_pose"
    - "expression_smile"
    - "expression_sad"
    - "expression_surprised"

# --- Gate (Compliance) ---
gate:
  vrchat_tier_target: "Good"     # Performance tier target: Excellent | Good | Medium | Poor
  rules_dir: "data/gate"         # Directory containing compliance rule YAML files.
  vrchat_rules_file: "vrchat_rules.yaml"
  vtube_rules_file: "vtube_rules.yaml"

# --- Output ---
output:
  root: "output"                 # Default output root when --out is not specified on CLI.
  create_if_missing: true        # Auto-create output directories.

# --- Brúarhönd (Bridge-Hand) — cross-machine VRoid Studio remote control ---
# D-010: Brúarhönd is a lateral dispatch surface; not part of the Blender pipeline.
# Daemon-side settings apply only on the VRoid host; client-side settings apply on the forge.
brunhand:
  # List of registered VRoid hosts. Add entries in config/user.yaml — never here.
  hosts: []
  daemon:
    # Default bind address for the daemon (Horfunarþjónn).
    # Override to a Tailscale interface address in config/user.yaml.
    # INVARIANT: The daemon refuses to bind to non-localhost unless allow_remote_bind: true.
    bind_address: "127.0.0.1"
    port: 8848
    # Explicit operator opt-in for Tailscale / non-loopback binding.
    # When false, any non-localhost bind_address causes a hard startup failure.
    allow_remote_bind: false
    tls:
      enabled: false
      cert_path: null
      key_path: null
    # Default project/export roots (relative paths on the daemon host — no absolute paths).
    project_root: "projects"
    export_root: "exports"
    # Per-primitive defaults
    primitive_defaults:
      wait_for_window_timeout: 30.0
      screenshot_compression: 6   # PNG compression level 0-9
    # Rate limiting (disabled by default)
    rate_limit: false
    rate_limit_window_seconds: 60
    rate_limit_max: 120
    request_timeout_seconds: 60
  client:
    timeout_seconds: 30.0
    connect_timeout_seconds: 5.0
    # Buffer added on top of a primitive's own timeout_seconds for the httpx request timeout.
    # Ensures the HTTP connection does not time out before the daemon-side primitive finishes.
    request_timeout_buffer: 5.0
    retry_max: 3
    retry_backoff_base: 0.5
    retry_on: [500, 502, 503]
    verify_tls: true
